<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Call Center - Cola de llamadas</title>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Fuente -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar navbar-dark">
        <div class="container-fluid d-flex justify-content-between">
            <a class="navbar-brand fw-bold" href="#">📞 Call Center</a>
            <button class="btn-gradient" data-bs-toggle="modal" data-bs-target="#modalLlamada"
                id="registrarLlamada">Registrar nueva
                llamada</button>
        </div>
    </nav>

    <div class="container my-4">
        <!-- Botón atender -->
        <div class="my-4">
            <button id="btnAtender" class="btn btn-success d-none">Atender siguiente llamada</button>
        </div>

        <!-- Llamada actual -->
        <h3 class="section-title">Llamada en atención</h3>
        <div class="card p-3 text-white">
            <div id="llamadaActual">
                <p>Ninguna llamada en atención.</p>
            </div>
            <div id="controlesLlamada" class="d-none">
                <button id="btnColgar" class="btn btn-danger me-2" data-bs-toggle="modal"
                    data-bs-target="#modalEstado">Colgar</button>
            </div>
        </div>

        <!-- Próxima llamada -->
        <h3 class="section-title">Próxima llamada</h3>
        <div id="proximaLlamada" class="card p-3  text-white">
            <p>No hay llamadas en cola.</p>
        </div>

        <!-- Cola de espera -->
        <h3 class="section-title">Cola de espera</h3>
        <ul id="colaEspera" class="list-group">

        </ul>

        <!-- Historial -->
        <h3 class="section-title">Historial de llamadas atendidas</h3>
        <table class="table table-dark table-striped">
            <thead>
                <tr>
                    <th>Ticket</th>
                    <th>Cliente</th>
                    <th>Teléfono</th>
                    <th>Motivo</th>
                    <th>Estado</th>
                </tr>
            </thead>
            <tbody id="historial">
                <!-- JS pintará aquí -->
            </tbody>
        </table>
    </div>

    <!-- Modal para registrar llamada -->
    <div class="modal fade" id="modalLlamada" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content text-light">
                <div class="modal-header">
                    <h5 class="modal-title">Registrar nueva llamada</h5>
                </div>
                <div class="modal-body">
                    <form id="formLlamada" class="row g-3">
                        <div class="col-12">
                            <input type="text" id="cliente" class="form-control" placeholder="Nombre del cliente"
                                required>
                        </div>
                        <div class="col-12">
                            <input type="number" id="telefono" class="form-control" placeholder="Teléfono (8 numeros)" required>
                        </div>
                        <div class="col-12">
                            <input type="text" id="motivo" class="form-control" placeholder="Motivo de la llamada"
                                required>
                        </div>
                        <div class="col-12">
                            <button type="submit" id="btnRegistrar" class="btn-gradient w-100" data-bs-dismiss="modal" disabled>Registrar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal para estado al colgar -->
    <div class="modal fade" id="modalEstado" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content text-light">
                <div class="modal-header">
                    <h5 class="modal-title">Seleccionar estado de la llamada</h5>
                </div>
                <div class="modal-body text-center" id="btnsEstados">
                    <button class="btn btn-outline-success m-2 resuelta" data-bs-dismiss="modal">Resuelta</button>
                    <button class="btn btn-outline-warning m-2 pendiente" data-bs-dismiss="modal">Pendiente</button>
                    <button class="btn btn-outline-danger m-2 seguimiento" data-bs-dismiss="modal">Requiere
                        seguimiento</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>

</html>
